<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trunfo Dino</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sandy-brown: #fa9f42ff;
    --muted-teal: #94a89aff;
    --pine-teal: #294936ff;
    --prussian-blue: #0d2149ff;
    --dark-wine: #721817ff;

    --bg: #0a1a10;
    --card-bg: #0f2a1a;
    --card-border: #294936ff;
    --text-light: #e8f0ea;
    --text-dim: #94a89aff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background-color: var(--bg);
    color: var(--text-light);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BG texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(41,73,54,0.35) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(13,33,73,0.4) 0%, transparent 55%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23294936' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ══════════════════════════════════
     SETUP SCREEN
  ══════════════════════════════════ */
  #setup-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: rgba(10,26,16,0.92);
    backdrop-filter: blur(6px);
  }

  .setup-box {
    background: var(--card-bg);
    border: 2px solid var(--pine-teal);
    border-radius: 4px;
    padding: 48px 56px;
    width: 100%;
    max-width: 520px;
    position: relative;
    box-shadow: 0 0 80px rgba(41,73,54,0.4), 0 0 0 1px rgba(148,168,154,0.1);
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .setup-dino-icon {
    font-size: 3.5rem;
    text-align: center;
    margin-bottom: 4px;
    display: block;
    filter: drop-shadow(0 0 12px var(--sandy-brown));
    animation: roar 3s ease-in-out infinite;
  }

  @keyframes roar {
    0%,100% { transform: scale(1) rotate(-3deg); }
    50%      { transform: scale(1.08) rotate(3deg); }
  }

  .setup-box h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    letter-spacing: 4px;
    text-align: center;
    color: var(--sandy-brown);
    text-shadow: 0 0 30px rgba(250,159,66,0.4);
    margin-bottom: 36px;
    line-height: 1;
  }

  .setup-box h1 span {
    color: var(--muted-teal);
    font-size: 1.2rem;
    display: block;
    letter-spacing: 8px;
    margin-top: 4px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }

  .field-group label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted-teal);
  }

  .field-group input[type="text"],
  .field-group input[type="number"] {
    background: rgba(41,73,54,0.25);
    border: 1px solid var(--pine-teal);
    border-radius: 3px;
    color: var(--text-light);
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field-group input:focus {
    border-color: var(--sandy-brown);
    box-shadow: 0 0 0 3px rgba(250,159,66,0.15);
  }

  .players-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .mode-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--pine-teal);
    border-radius: 3px;
    overflow: hidden;
  }

  .mode-toggle input { display: none; }

  .mode-toggle label {
    padding: 11px 10px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    background: transparent;
    color: var(--text-dim);
    transition: background 0.2s, color 0.2s;
  }

  .mode-toggle input:checked + label {
    background: var(--sandy-brown);
    color: var(--prussian-blue);
  }


  .type-filters {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .type-option {
    position: relative;
  }

  .type-option input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .type-option label {
    display: block;
    width: 100%;
    padding: 11px 10px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--pine-teal);
    border-radius: 3px;
    background: rgba(41,73,54,0.18);
    color: var(--text-dim);
    transition: background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
    user-select: none;
  }

  .type-option input:checked + label {
    background: rgba(250,159,66,0.16);
    color: var(--sandy-brown);
    border-color: var(--sandy-brown);
    box-shadow: 0 0 0 2px rgba(250,159,66,0.12);
  }

  .btn-start {
    width: 100%;
    margin-top: 28px;
    padding: 15px;
    background: var(--sandy-brown);
    color: var(--prussian-blue);
    border: none;
    border-radius: 3px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    box-shadow: 0 4px 20px rgba(250,159,66,0.3);
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(250,159,66,0.45);
  }

  .btn-start:active { transform: translateY(0); }

  .setup-error {
    color: #e05a5a;
    font-size: 0.82rem;
    margin-top: 10px;
    text-align: center;
    min-height: 18px;
  }

  /* ══════════════════════════════════
     GAME SCREEN
  ══════════════════════════════════ */
  #game-screen {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 24px 20px 32px;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  #game-screen.active { display: flex; }

  /* header */
  .game-header {
    width: 100%;
    max-width: 980px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(41,73,54,0.6);
  }

  .game-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem;
    letter-spacing: 3px;
    color: var(--sandy-brown);
    text-shadow: 0 0 20px rgba(250,159,66,0.3);
  }

  .game-logo span { color: var(--muted-teal); font-size: 0.9rem; letter-spacing: 6px; display: block; line-height: 0.8; }

  .btn-restart {
    background: transparent;
    border: 1px solid var(--pine-teal);
    color: var(--muted-teal);
    padding: 7px 16px;
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-restart:hover {
    border-color: var(--sandy-brown);
    color: var(--sandy-brown);
  }

  /* turn banner */
  .turn-banner {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--prussian-blue);
    background: var(--sandy-brown);
    padding: 6px 20px;
    border-radius: 2px;
    margin-bottom: 20px;
    text-align: center;
    transition: opacity 0.3s;
  }

  /* arena */
  .arena {
    width: 100%;
    max-width: 1120px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(220px, 24vw) minmax(0, 1fr);
    gap: 0;
    align-items: start;
  }

  /* player panel */
  .player-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .player-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--text-light);
  }

  .player-name.active-player {
    color: var(--sandy-brown);
    border: 2px solid var(--sandy-brown);
    border-radius: 4px;
    padding: 4px 14px;
    box-shadow: 0 0 18px rgba(250,159,66,0.55), 0 0 40px rgba(250,159,66,0.2);
    animation: pulseGlow 1.8s ease-in-out infinite;
  }

  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 14px rgba(250,159,66,0.5), 0 0 36px rgba(250,159,66,0.15); }
    50%      { box-shadow: 0 0 26px rgba(250,159,66,0.8), 0 0 60px rgba(250,159,66,0.3); }
  }

  .attr-key-hint {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--pine-teal);
    background: rgba(41,73,54,0.4);
    border: 1px solid var(--pine-teal);
    border-radius: 2px;
    padding: 1px 4px;
    margin-right: 5px;
    letter-spacing: 0;
    transition: color 0.15s, border-color 0.15s;
  }

  .attr-row.selectable:hover .attr-key-hint {
    color: var(--sandy-brown);
    border-color: var(--sandy-brown);
  }

  .card-count-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .card-count-badge strong {
    color: var(--muted-teal);
    font-size: 1rem;
  }

  /* ── CARD ── */
  .card-wrapper {
    perspective: 900px;
    width: 100%;
    max-width: 340px;
  }

  .card {
    width: 100%;
    border-radius: 6px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 6px;
    overflow: hidden;
  }

  .card-front {
    background: linear-gradient(160deg, #0f2a1a 0%, #0a1e12 100%);
    border: 2px solid var(--pine-teal);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(148,168,154,0.1);
  }

  .card-back {
    position: absolute;
    inset: 0;
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #0d2149 0%, #0a1830 100%);
    border: 2px solid var(--prussian-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .card-back-pattern {
    font-size: 5rem;
    opacity: 0.12;
    user-select: none;
    filter: blur(1px);
  }

  .card-back-icon {
    position: absolute;
    font-size: 3rem;
    filter: drop-shadow(0 0 16px rgba(13,33,73,0.8));
  }

  .card-img-wrap {
    width: 100%;
    height: 180px;
    overflow: hidden;
    position: relative;
    background: linear-gradient(180deg, rgba(41,73,54,0.3) 0%, transparent 100%);
  }


  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
    padding: 10px;
  }

  .card-win-glow .card-front {
    border-color: #2ea043;
    box-shadow: 0 0 0 1px rgba(46,160,67,0.35), 0 0 28px rgba(46,160,67,0.45), 0 0 60px rgba(46,160,67,0.18);
  }

  .card-lose-glow .card-front {
    border-color: #dc3545;
    box-shadow: 0 0 0 1px rgba(220,53,69,0.35), 0 0 26px rgba(220,53,69,0.4), 0 0 56px rgba(220,53,69,0.16);
  }

  .card-img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
  }

  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 2px;
    color: var(--sandy-brown);
    padding: 10px 14px 4px;
    text-shadow: 0 0 20px rgba(250,159,66,0.3);
  }

  .card-tipo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted-teal);
    padding: 0 14px 10px;
  }

  .card-attrs {
    padding: 8px 12px 14px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .attr-row {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: space-between;
    min-height: 64px;
    padding: 10px 10px 8px;
    border: 1px solid rgba(41,73,54,0.6);
    border-radius: 6px;
    background: rgba(13,33,73,0.12);
    cursor: default;
    transition: background 0.15s, border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .attr-row.selectable {
    cursor: pointer;
    touch-action: manipulation;
  }

  .attr-row.selectable:hover {
    background: rgba(250,159,66,0.12);
    border-color: rgba(250,159,66,0.5);
    transform: translateY(-1px);
  }

  .attr-row.selectable:hover .attr-label { color: var(--sandy-brown); }

  .attr-row.winning {
    background: rgba(46,160,67,0.18) !important;
    border-color: #2ea043;
    box-shadow: inset 0 0 0 1px rgba(46,160,67,0.32), 0 0 18px rgba(46,160,67,0.38);
  }

  .attr-row.losing {
    background: rgba(220,53,69,0.16) !important;
    border-color: #dc3545;
    box-shadow: inset 0 0 0 1px rgba(220,53,69,0.28), 0 0 18px rgba(220,53,69,0.32);
  }

  .attr-row.tied {
    background: rgba(13,33,73,0.35) !important;
    border-color: var(--prussian-blue);
  }

  .attr-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    transition: color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: space-between;
    width: 100%;
  }

  .attr-icon { font-size: 0.9rem; }

  .attr-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 1px;
    color: var(--text-light);
    margin-top: 8px;
  }

  .attr-bar-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(41,73,54,0.3);
  }

  .attr-bar {
    height: 100%;
    background: var(--pine-teal);
    transition: width 0.5s ease;
  }

  /* center column */
  .arena-center {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    padding: 80px 12px 0;
    gap: 12px;
  }

  .vs-badge {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--dark-wine);
    text-shadow: 0 0 20px rgba(114,24,23,0.5);
    letter-spacing: 2px;
  }

  .pile-info {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.5;
  }

  .pile-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--sandy-brown);
    display: block;
  }

  /* result panel in arena center */
  .result-overlay {
    width: 100%;
    display: none;
    align-items: stretch;
    justify-content: center;
    flex: 1 1 auto;
  }

  .result-overlay.show {
    display: flex;
  }

  .result-box {
    width: 100%;
    min-height: 132px;
    background: rgba(10,26,16,0.97);
    border: 2px solid var(--pine-teal);
    border-radius: 6px;
    padding: 12px 10px;
    text-align: center;
    box-shadow: 0 0 28px rgba(0,0,0,0.45);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  }

  .result-box:hover {
    border-color: var(--sandy-brown);
    box-shadow: 0 0 30px rgba(250,159,66,0.18), 0 0 28px rgba(0,0,0,0.45);
    transform: translateY(-1px);
  }

  .result-emoji { display: none; }

  .result-title {
    width: 100%;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.05rem, 3vw, 1.55rem);
    letter-spacing: 1px;
    color: var(--sandy-brown);
    text-shadow: 0 0 22px rgba(250,159,66,0.35);
    line-height: 1.05;
    margin: 0;
    overflow-wrap: anywhere;
    word-break: break-word;
    hyphens: auto;
  }

  .result-subtitle {
    display: block;
    width: 100%;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #ffd24a;
    line-height: 1.15;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  /* winner screen */
  .winner-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 300;
    background: rgba(10,26,16,0.97);
  }

  .winner-overlay.show { display: flex; }

  .winner-box {
    text-align: center;
    animation: fadeUp 0.6s ease;
  }

  .winner-dino { font-size: 6rem; display: block; margin-bottom: 8px;
    animation: roar 1.5s ease-in-out infinite; }

  .winner-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted-teal);
    margin-bottom: 4px;
  }

  .winner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4.5rem;
    letter-spacing: 4px;
    color: var(--sandy-brown);
    text-shadow: 0 0 60px rgba(250,159,66,0.5);
    margin-bottom: 8px;
    line-height: 1;
  }

  .winner-sub {
    font-family: 'Barlow', sans-serif;
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 36px;
  }

  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 299;
  }

  .confetti-piece {
    position: absolute;
    top: -10px;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* loading */
  .loading-screen {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 150;
    background: rgba(10,26,16,0.97);
    flex-direction: column;
    gap: 16px;
  }

  .loading-screen.show { display: flex; }

  .loading-dino {
    font-size: 3rem;
    animation: roar 0.8s ease-in-out infinite;
  }

  .loading-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted-teal);
  }

  .loading-bar-track {
    width: 200px;
    height: 3px;
    background: var(--pine-teal);
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: var(--sandy-brown);
    border-radius: 2px;
    animation: loadingAnim 1.2s ease-in-out infinite;
  }

  @keyframes loadingAnim {
    0%   { width: 0%; margin-left: 0; }
    50%  { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }

  /* table pile cards */
  .table-pile {
    justify-content: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
  }

  .pile-card-mini {
    width: 36px;
    height: 6px;
    border-radius: 2px;
    border: 1px solid var(--prussian-blue);
    background: linear-gradient(90deg, #0d2149, #0a1830);
  }

  @media (max-width: 700px) {
    .arena { grid-template-columns: 1fr; }
    .arena-center { padding: 0; flex-direction: column; margin: 14px 0; }
    .result-overlay { width: 100%; max-width: none; }
    .setup-box { padding: 32px 24px; }
    .players-row { grid-template-columns: 1fr; }
    .type-filters { grid-template-columns: 1fr; }
    .card-attrs { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
  }
</style>
</head>
<body>

<!-- ══ LOADING ══ -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-dino">🦕</div>
  <div class="loading-text">Convocando dinossauros...</div>
  <div class="loading-bar-track"><div class="loading-bar"></div></div>
</div>

<!-- ══ SETUP ══ -->
<div id="setup-screen">
  <div class="setup-box">
    <span class="setup-dino-icon">🦖</span>
    <h1>Trunfo Dino<span>Batalha Jurássica</span></h1>

    <div class="players-row">
      <div class="field-group">
        <label>Jogador 1</label>
        <input type="text" id="p1-name" placeholder="Nome do jogador 1" maxlength="20">
      </div>
      <div class="field-group">
        <label>Jogador 2</label>
        <input type="text" id="p2-name" placeholder="Nome do jogador 2" maxlength="20">
      </div>
    </div>

    <div class="field-group">
      <label>Quantidade de cartas (por jogador)</label>
      <input type="number" id="card-count" value="5" min="2" max="20">
    </div>

    <div class="field-group">
      <label>Modo de seleção</label>
      <div class="mode-toggle">
        <input type="radio" name="mode" id="mode-random" value="random" checked>
        <label for="mode-random">🎲 Aleatórios</label>
        <input type="radio" name="mode" id="mode-top" value="top">
        <label for="mode-top">⭐ Mais Famosos</label>
      </div>
    </div>

    <div class="field-group">
      <label>Tipos permitidos</label>
      <div class="type-filters">
        <div class="type-option">
          <input type="checkbox" id="tipo-terrestre" value="terrestre" checked>
          <label for="tipo-terrestre">🌿 Terrestres</label>
        </div>
        <div class="type-option">
          <input type="checkbox" id="tipo-aquatico" value="aquatico" checked>
          <label for="tipo-aquatico">🌊 Aquáticos</label>
        </div>
        <div class="type-option">
          <input type="checkbox" id="tipo-voador" value="voador" checked>
          <label for="tipo-voador">🪽 Voadores</label>
        </div>
      </div>
    </div>

    <p class="setup-error" id="setup-error"></p>
    <button class="btn-start" onclick="startGame()">⚔ BATALHAR</button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="game-screen">
  <header class="game-header">
    <div class="game-logo">Trunfo Dino<span>Batalha JURÁSSICA</span></div>
    <button class="btn-restart" onclick="restartGame()">↺ REINICIAR</button>
  </header>

  <div class="turn-banner" id="turn-banner">Vez de Jogador 1</div>

  <div class="arena">
    <!-- PLAYER 1 -->
    <div class="player-panel" id="panel-p1">
      <div class="player-info">
        <div class="player-name" id="p1-display">Jogador 1</div>
        <div class="card-count-badge">Cartas: <strong id="p1-count">0</strong></div>
      </div>
      <div class="card-wrapper">
        <div class="card" id="card-p1">
          <div class="card-face card-front" id="card-p1-front">
            <div class="card-img-wrap"><div class="card-img-placeholder">🦕</div></div>
            <div class="card-name">—</div>
            <div class="card-tipo">—</div>
            <div class="card-attrs" id="attrs-p1"></div>
          </div>
          <div class="card-face card-back">
            <div class="card-back-pattern">🦖🦕🦖🦕🦖🦕🦖🦕🦖🦕</div>
            <div class="card-back-icon">🦖</div>
          </div>
        </div>
      </div>
    </div>

    <!-- CENTER -->
    <div class="arena-center">
      <div class="vs-badge">VS</div>
      <div class="pile-info">
        Mesa
        <span class="pile-count" id="pile-count">0</span>
        cartas
      </div>
      <div class="table-pile" id="table-pile-mini"></div>
      <div class="result-overlay" id="result-overlay">
        <div class="result-box" id="result-box" onclick="nextRound()" role="button" tabindex="0" aria-label="Continuar para a próxima rodada">
          <span class="result-emoji" id="result-emoji">🏆</span>
          <div class="result-title" id="result-title">Vitória!</div>
          <div class="result-subtitle" id="result-subtitle">Clique aqui pra continuar</div>
        </div>
      </div>
    </div>

    <!-- PLAYER 2 -->
    <div class="player-panel" id="panel-p2">
      <div class="player-info">
        <div class="player-name" id="p2-display">Jogador 2</div>
        <div class="card-count-badge">Cartas: <strong id="p2-count">0</strong></div>
      </div>
      <div class="card-wrapper">
        <div class="card" id="card-p2">
          <div class="card-face card-front" id="card-p2-front">
            <div class="card-img-wrap"><div class="card-img-placeholder">🦕</div></div>
            <div class="card-name">—</div>
            <div class="card-tipo">—</div>
            <div class="card-attrs" id="attrs-p2"></div>
          </div>
          <div class="card-face card-back">
            <div class="card-back-pattern">🦖🦕🦖🦕🦖🦕🦖🦕🦖🦕</div>
            <div class="card-back-icon">🦖</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ WINNER OVERLAY ══ -->
<div class="winner-overlay" id="winner-overlay">
  <div class="confetti-container" id="confetti"></div>
  <div class="winner-box">
    <span class="winner-dino">🏆</span>
    <div class="winner-label">Campeão Jurássico</div>
    <div class="winner-name" id="winner-name">—</div>
    <div class="winner-sub" id="winner-sub">esmagou a concorrência!</div>
    <button class="btn-start" onclick="restartGame()" style="margin-top:0">↺ JOGAR NOVAMENTE</button>
  </div>
</div>

<script>
  // ─────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────
  const ATTRS = [
    { key: 'altura',        label: 'Altura',        icon: '📏', unit: 'm',  max: 15   },
    { key: 'comprimento',   label: 'Comprimento',   icon: '📐', unit: 'm',  max: 40   },
    { key: 'peso',          label: 'Peso',          icon: '⚖️', unit: 'kg', max: 80000 },
    { key: 'velocidade',    label: 'Velocidade',    icon: '💨', unit: 'km/h', max: 80 },
    { key: 'agilidade',     label: 'Agilidade',     icon: '🌀', unit: '',   max: 10   },
    { key: 'longevidade',   label: 'Longevidade',   icon: '⏳', unit: 'M anos', max: 100 },
    { key: 'numero_magico', label: 'Nº Mágico',     icon: '✨', unit: '',   max: 100  },
  ];

  let state = {
    p1: { name: '', deck: [] },
    p2: { name: '', deck: [] },
    tablePile: [],
    currentPlayer: 1,   // 1 or 2
    phase: 'choose',    // 'choose' | 'reveal'
    chosenAttr: null,
    roundWinner: null,
  };

  // ─────────────────────────────────────────
  // SETUP
  // ─────────────────────────────────────────
  async function startGame() {
    const p1name = document.getElementById('p1-name').value.trim() || 'Jogador 1';
    const p2name = document.getElementById('p2-name').value.trim() || 'Jogador 2';
    const n = parseInt(document.getElementById('card-count').value);
    const mode = document.querySelector('input[name="mode"]:checked').value;
    const errEl = document.getElementById('setup-error');

    if (isNaN(n) || n < 2) {
      errEl.textContent = 'Insira pelo menos 2 cartas por jogador.';
      return;
    }
    errEl.textContent = '';

    showLoading(true);

    const total = n * 2;
    const selectedTypes = Array.from(document.querySelectorAll('.type-filters input:checked')).map(el => el.value);

    if (selectedTypes.length === 0) {
      errEl.textContent = 'Selecione pelo menos um tipo de dino.';
      return;
    }

    let todosDinos;
    try {
      const res = await fetch('./dados.json');
      if (!res.ok) throw new Error('Não foi possível carregar dados.json');
      todosDinos = await res.json();
    } catch (e) {
      showLoading(false);
      errEl.textContent = `Erro ao carregar os dados: ${e.message}`;
      return;
    }

    todosDinos = todosDinos.filter(d => selectedTypes.includes((d.tipo || '').toLowerCase()));

    if (!Array.isArray(todosDinos) || todosDinos.length < total) {
      showLoading(false);
      errEl.textContent = 'Não há dinos suficientes com os tipos selecionados. Tente menos cartas ou marque mais tipos.';
      return;
    }

    let dinos;
    if (mode === 'top') {
      dinos = [...todosDinos]
        .sort((a, b) => Number(b.fama) - Number(a.fama))
        .slice(0, total);
    } else {
      dinos = [...todosDinos];
      shuffle(dinos);
      dinos = dinos.slice(0, total);
    }


    // shuffle para garantir aleatoriedade mesmo no modo top
    shuffle(dinos);

    // substituir numero_magico de todas as cartas por valor aleatório 1..10
    dinos.forEach(d => { d.numero_magico = Math.floor(Math.random() * 10) + 1; });

    state.p1 = { name: p1name, deck: dinos.slice(0, n) };
    state.p2 = { name: p2name, deck: dinos.slice(n, total) };
    state.tablePile = [];
    state.currentPlayer = Math.random() < 0.5 ? 1 : 2;
    state.phase = 'choose';
    state.chosenAttr = null;
    state.roundWinner = null;

    

    showLoading(false);
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').classList.add('active');

    renderGame();
  }

  // ─────────────────────────────────────────
  // RENDER
  // ─────────────────────────────────────────
  function renderGame() {
    const { p1, p2, currentPlayer, phase, chosenAttr, tablePile } = state;

    document.getElementById('p1-display').textContent = p1.name;
    document.getElementById('p2-display').textContent = p2.name;
    document.getElementById('p1-count').textContent = p1.deck.length;
    document.getElementById('p2-count').textContent = p2.deck.length;


    // active player name highlight
    document.getElementById('p1-display').className = 'player-name' + (currentPlayer === 1 ? ' active-player' : '');
    document.getElementById('p2-display').className = 'player-name' + (currentPlayer === 2 ? ' active-player' : '');

    const activeP = currentPlayer === 1 ? p1 : p2;
    document.getElementById('turn-banner').textContent = phase === 'reveal'
      ? `Comparando cartas...`
      : `Vez de ${activeP.name} — escolha um atributo!`;

    document.getElementById('card-p1').classList.remove('card-win-glow', 'card-lose-glow');
    document.getElementById('card-p2').classList.remove('card-win-glow', 'card-lose-glow');

    // table pile
    document.getElementById('pile-count').textContent = tablePile.length;
    const miniEl = document.getElementById('table-pile-mini');
    miniEl.innerHTML = '';
    const show = Math.min(tablePile.length, 4);
    for (let i = 0; i < show; i++) {
      const d = document.createElement('div');
      d.className = 'pile-card-mini';
      miniEl.appendChild(d);
    }

    const cardP1 = p1.deck[0];
    const cardP2 = p2.deck[0];

    renderCard('p1', cardP1, phase === 'choose' ? (currentPlayer === 2) : false, chosenAttr, currentPlayer === 1 || phase === 'reveal', 1);
    renderCard('p2', cardP2, phase === 'choose' ? (currentPlayer === 1) : false, chosenAttr, currentPlayer === 2 || phase === 'reveal', 2);
  }

  function renderCard(player, dino, faceDown, chosenAttr, isActive, playerNum) {
    const cardEl = document.getElementById(`card-${player}`);
    const frontEl = document.getElementById(`card-${player}-front`);

    // flip
    if (faceDown) {
      cardEl.classList.add('flipped');
    } else {
      cardEl.classList.remove('flipped');
    }

    if (!dino) return;

    // image — tenta NomeDoDino.png no GitHub, fallback para imgs/dino.svg
    const imgWrap = frontEl.querySelector('.card-img-wrap');
    if (dino.nome) {
      const nomePng = encodeURIComponent(dino.nome) + '.png';
      const githubUrl = `https://raw.githubusercontent.com/rafaellindemann/trunfo-dino/main/imgs/${nomePng}`;
      imgWrap.innerHTML = `<img src="${githubUrl}" alt="${dino.nome}" onerror="this.src='imgs/dino.svg'">`;
    } else {
      imgWrap.innerHTML = `<img src="imgs/dino.svg" alt="dino">`;
    }

    frontEl.querySelector('.card-name').textContent = dino.nome || '—';
    frontEl.querySelector('.card-tipo').textContent = dino.tipo || '';

    if (chosenAttr) {
      if (state.roundWinner === playerNum) cardEl.classList.add('card-win-glow');
      else if (state.roundWinner && state.roundWinner !== 'tie') cardEl.classList.add('card-lose-glow');
    }

    // attrs
    const attrsEl = document.getElementById(`attrs-${player}`);
    attrsEl.innerHTML = '';

    ATTRS.forEach(attr => {
      const val = dino[attr.key];
      if (val === null || val === undefined) return;

      const row = document.createElement('div');
      row.className = 'attr-row';

      // highlight
      if (chosenAttr) {
        const p1val = state.p1.deck[0][chosenAttr];
        const p2val = state.p2.deck[0][chosenAttr];
        if (attr.key === chosenAttr) {
          const myVal  = playerNum === 1 ? p1val : p2val;
          const oppVal = playerNum === 1 ? p2val : p1val;
          if (myVal > oppVal)       row.classList.add('winning');
          else if (myVal < oppVal)  row.classList.add('losing');
          else                      row.classList.add('tied');
        }
      }

      // selectable only for active player in choose phase
      if (isActive && state.phase === 'choose') {
        row.classList.add('selectable');
        row.addEventListener('click', () => chooseAttr(attr.key));
      }

      const pct = Math.min(100, Math.round((parseFloat(val) / attr.max) * 100));
      const idx = attrsEl.children.length + 1; // 1-based index for keyboard

      row.innerHTML = `
        <span class="attr-label"><span><span class="attr-key-hint">[${idx}]</span><span class="attr-icon">${attr.icon}</span>${attr.label}</span></span>
        <span class="attr-value">${formatVal(val, attr.unit)}</span>
        <div class="attr-bar-wrap"><div class="attr-bar" style="width:${pct}%"></div></div>
      `;

      attrsEl.appendChild(row);
    });
  }

  // ─────────────────────────────────────────
  // GAME LOGIC
  // ─────────────────────────────────────────
  function chooseAttr(attrKey) {
    if (state.phase !== 'choose') return;

    state.chosenAttr = attrKey;
    state.phase = 'reveal';

    // un-flip opponent card
    renderGame();

    // compare
    const p1val = parseFloat(state.p1.deck[0][attrKey]);
    const p2val = parseFloat(state.p2.deck[0][attrKey]);

    const attrLabel = ATTRS.find(a => a.key === attrKey)?.label || attrKey;

    setTimeout(() => {
      if (p1val > p2val) {
        state.roundWinner = 1;
        renderGame();
        showResult('win', state.p1.name, attrLabel, p1val, p2val);
      } else if (p2val > p1val) {
        state.roundWinner = 2;
        renderGame();
        showResult('win', state.p2.name, attrLabel, p2val, p1val);
      } else {
        state.roundWinner = 'tie';
        renderGame();
        showResult('tie', null, attrLabel, p1val, p2val);
      }
    }, 900);
  }

  function showResult(type, winnerName, attrLabel, winVal, loseVal) {
    const overlay = document.getElementById('result-overlay');
    const emoji   = document.getElementById('result-emoji');
    const title   = document.getElementById('result-title');
    const sub     = document.getElementById('result-subtitle');

    if (type === 'tie') {
      emoji.textContent = '🤝';
      title.textContent = 'Empate';
      sub.textContent   = 'Clique aqui pra continuar';
    } else {
      emoji.textContent = '🏆';
      title.textContent = winnerName;
      sub.textContent   = 'Clique aqui pra continuar';
    }

    overlay.classList.add('show');
    document.getElementById('result-box').focus();
    state._pendingResult = type === 'tie' ? 'tie' : (winnerName === state.p1.name ? 'p1' : 'p2');
  }

  function nextRound() {
    document.getElementById('result-overlay').classList.remove('show');

    const currentCardP1 = document.getElementById('card-p1');
    const currentCardP2 = document.getElementById('card-p2');
    currentCardP1.classList.add('flipped');
    currentCardP2.classList.add('flipped');

    const result = state._pendingResult;
    const card1 = state.p1.deck.shift();
    const card2 = state.p2.deck.shift();

    if (result === 'tie') {
      state.tablePile.push(card1, card2);
      // turn stays with same player (already in state.currentPlayer)
    } else {
      const winner = result == 'p1' ? state.p1 : state.p2;
      winner.deck.push(...state.tablePile, card1, card2);
      state.tablePile = [];
      state.currentPlayer = result == 'p1' ? 1 : 2;
    }

    state.phase = 'choose';
    state.chosenAttr = null;
    state.roundWinner = null;

    setTimeout(() => {
      if (state.p1.deck.length === 0) return endGame(state.p2.name);
      if (state.p2.deck.length === 0) return endGame(state.p1.name);
      renderGame();
    }, 560);
  }

  function endGame(winnerName) {
    document.getElementById('winner-name').textContent = winnerName;
    document.getElementById('winner-sub').textContent = 'dominou o Jurássico!';
    document.getElementById('winner-overlay').classList.add('show');
    spawnConfetti();
  }

  // ─────────────────────────────────────────
  // UTILS
  // ─────────────────────────────────────────
  function formatVal(val, unit) {
    const n = parseFloat(val);
    const s = n % 1 === 0 ? n.toString() : n.toFixed(2);
    return unit ? `${s} ${unit}` : s;
  }

  // keyboard shortcut: press [1]..[7] to choose attr
  document.addEventListener('keydown', (e) => {
    if (state.phase !== 'choose') return;
    const n = parseInt(e.key);
    if (isNaN(n) || n < 1) return;
    const visibleAttrs = ATTRS.filter(a => {
      const activeCard = state.currentPlayer === 1 ? state.p1.deck[0] : state.p2.deck[0];
      return activeCard && activeCard[a.key] !== null && activeCard[a.key] !== undefined;
    });
    const attr = visibleAttrs[n - 1];
    if (attr) chooseAttr(attr.key);
  });

  document.getElementById('result-box').addEventListener('keydown', (e) => {
    if (!document.getElementById('result-overlay').classList.contains('show')) return;
    if (e.key == 'Enter' || e.key == ' ') {
      e.preventDefault();
      nextRound();
    }
  });

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  function showLoading(show) {
    const el = document.getElementById('loading-screen');
    el.classList.toggle('show', show);
  }

  function restartGame() {
    document.getElementById('winner-overlay').classList.remove('show');
    document.getElementById('result-overlay').classList.remove('show');
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('setup-screen').style.display = 'flex';
    document.getElementById('confetti').innerHTML = '';
    state.phase = 'choose';
    state.chosenAttr = null;
    state.roundWinner = null;
  }

  function spawnConfetti() {
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    const colors = ['#fa9f42', '#94a89a', '#294936', '#0d2149', '#721817', '#fff'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width  = (6 + Math.random() * 8) + 'px';
      el.style.height = (6 + Math.random() * 8) + 'px';
      el.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
      el.style.animationDelay    = (Math.random() * 1.5) + 's';
      container.appendChild(el);
    }
  }
</script>
</body>
</html>
