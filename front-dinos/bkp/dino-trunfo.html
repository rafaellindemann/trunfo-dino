<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trunfo Dino</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --coffee-bean: #7f5539ff;
      --camel: #a68a64ff;
      --almond-cream: #ede0d4ff;
      --dusty-olive: #656d4aff;
      --ebony: #414833ff;

      --bg: #2a2418;
      --surface: #1e1b14;
      --card-bg: #2f2a1f;
      --text: var(--almond-cream);
      --text-muted: var(--camel);
      --accent: var(--coffee-bean);
      --accent2: var(--dusty-olive);
      --border: rgba(166,138,100,0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      text-align: center;
      padding: 3.5rem 1rem 2rem;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    header::after {
      content: '🦕';
      position: absolute;
      font-size: 9rem;
      opacity: 0.04;
      top: -1rem;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }
    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--camel);
      letter-spacing: 0.08em;
      text-shadow: 0 2px 24px rgba(127,85,57,0.5);
      animation: fadeDown 0.8s ease both;
    }
    header p {
      color: var(--text-muted);
      font-style: italic;
      margin-top: 0.4rem;
      font-size: 0.95rem;
      animation: fadeDown 0.8s 0.15s ease both;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.8s 0.25s ease both;
    }
    .toolbar-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-right: auto;
    }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      font-family: 'Lora', serif;
      transition: all 0.2s ease;
    }
    .btn {
      padding: 0.55rem 1.2rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .btn-primary {
      background: var(--coffee-bean);
      color: var(--almond-cream);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-primary:hover { background: #9a6645; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(127,85,57,0.4); }
    .btn-secondary {
      background: transparent;
      color: var(--camel);
      border: 1px solid var(--camel);
    }
    .btn-secondary:hover { background: rgba(166,138,100,0.12); transform: translateY(-1px); }
    .btn-danger {
      background: transparent;
      color: #c26b5a;
      border: 1px solid #c26b5a55;
      font-size: 0.78rem;
      padding: 0.3rem 0.7rem;
      border-radius: 3px;
    }
    .btn-danger:hover { background: rgba(194,107,90,0.15); }
    .btn-edit {
      background: transparent;
      color: var(--dusty-olive);
      border: 1px solid var(--dusty-olive);
      font-size: 0.78rem;
      padding: 0.3rem 0.7rem;
      border-radius: 3px;
    }
    .btn-edit:hover { background: rgba(101,109,74,0.2); }

    /* ── Cards Grid ── */
    #cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    /* ── Dino Card ── */
    .dino-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      animation: cardIn 0.5s ease both;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .dino-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--coffee-bean);
      border-color: var(--coffee-bean);
    }
    .dino-card::before {
      content: '';
      display: block;
      height: 4px;
      background: linear-gradient(90deg, var(--coffee-bean), var(--dusty-olive));
    }
    .card-emoji {
      font-size: 3.5rem;
      text-align: center;
      padding: 1.25rem 1rem 0.5rem;
      display: block;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
      transition: transform 0.3s ease;
    }
    .dino-card:hover .card-emoji { transform: scale(1.15) rotate(-5deg); }

    .card-body { padding: 0 1.25rem 1.25rem; }
    .card-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.05rem;
      color: var(--camel);
      margin-bottom: 0.75rem;
      text-align: center;
      line-height: 1.3;
    }
    .card-id {
      font-size: 0.7rem;
      color: rgba(166,138,100,0.4);
      text-align: center;
      margin-bottom: 0.75rem;
      letter-spacing: 0.1em;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem 0.75rem;
      margin-bottom: 1rem;
    }
    .stat {
      display: flex;
      flex-direction: column;
    }
    .stat-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(166,138,100,0.55);
      margin-bottom: 1px;
    }
    .stat-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--almond-cream);
    }
    .stat-bar {
      height: 3px;
      background: rgba(166,138,100,0.12);
      border-radius: 2px;
      margin-top: 3px;
      overflow: hidden;
    }
    .stat-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--coffee-bean), var(--camel));
      transition: width 0.8s cubic-bezier(.16,1,.3,1);
      width: 0;
    }
    .dino-card.visible .stat-bar-fill { /* triggered by JS */ }

    .magic-number {
      text-align: center;
      margin: 0.75rem 0;
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.4rem;
      color: var(--dusty-olive);
      text-shadow: 0 0 20px rgba(101,109,74,0.5);
      animation: pulse 2.5s ease infinite;
    }
    .magic-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(101,109,74,0.6);
      text-align: center;
      margin-bottom: 0.75rem;
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    /* ── Empty / Loading / Error states ── */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      font-style: italic;
    }
    .state-box .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .spinner {
      display: inline-block;
      width: 2rem; height: 2rem;
      border: 3px solid var(--border);
      border-top-color: var(--camel);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--ebony);
      color: var(--almond-cream);
      padding: 0.85rem 1.4rem;
      border-radius: 6px;
      border-left: 4px solid var(--dusty-olive);
      font-size: 0.88rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 9999;
      opacity: 0;
      transform: translateY(1rem);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-left-color: #c26b5a; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      transform: scale(0.92) translateY(16px);
      transition: transform 0.35s cubic-bezier(.16,1,.3,1);
      position: relative;
    }
    .modal-backdrop.open .modal { transform: scale(1) translateY(0); }

    .modal h2 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.1rem;
      color: var(--camel);
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-close {
      position: absolute;
      top: 1.1rem; right: 1.25rem;
      background: none;
      color: var(--camel);
      font-size: 1.3rem;
      line-height: 1;
      opacity: 0.6;
    }
    .modal-close:hover { opacity: 1; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }
    input, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.55rem 0.75rem;
      color: var(--text);
      font-family: 'Lora', serif;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--coffee-bean);
    }
    .form-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    /* ── Confirm dialog ── */
    #confirm-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #confirm-backdrop.open { opacity: 1; pointer-events: all; }
    #confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      max-width: 360px;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.25s ease;
    }
    #confirm-backdrop.open #confirm-box { transform: scale(1); }
    #confirm-box p { margin-bottom: 1.5rem; color: var(--text-muted); line-height: 1.6; }
    #confirm-box .confirm-actions { display: flex; gap: 0.75rem; justify-content: center; }

    /* ── Keyframes ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    /* staggered card delays */
    .dino-card:nth-child(1)  { animation-delay: 0.05s; }
    .dino-card:nth-child(2)  { animation-delay: 0.10s; }
    .dino-card:nth-child(3)  { animation-delay: 0.15s; }
    .dino-card:nth-child(4)  { animation-delay: 0.20s; }
    .dino-card:nth-child(5)  { animation-delay: 0.25s; }
    .dino-card:nth-child(6)  { animation-delay: 0.30s; }
    .dino-card:nth-child(7)  { animation-delay: 0.35s; }
    .dino-card:nth-child(8)  { animation-delay: 0.40s; }
    .dino-card:nth-child(9)  { animation-delay: 0.45s; }
    .dino-card:nth-child(10) { animation-delay: 0.50s; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--coffee-bean); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>TRUNFO DINO</h1>
  <p>Gestão do bestiário jurássico</p>
</header>

<div class="toolbar">
  <span class="toolbar-title">Registro de Criaturas</span>
  <button class="btn btn-secondary" onclick="loadDinos()">↻ Recarregar</button>
  <button class="btn btn-primary" onclick="openModal()">+ Novo Dino</button>
</div>

<div id="cards-grid">
  <div class="state-box"><div class="spinner"></div></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal Criar / Editar -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title">Novo Dinossauro</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Nome</label>
        <input type="text" id="f-nome" placeholder="Ex: T-Rex" />
      </div>
      <div class="form-group">
        <label>Altura (cm)</label>
        <input type="number" id="f-altura" placeholder="0" />
      </div>
      <div class="form-group">
        <label>Comprimento (cm)</label>
        <input type="number" id="f-comprimento" placeholder="0" />
      </div>
      <div class="form-group">
        <label>Peso (kg)</label>
        <input type="number" id="f-peso" placeholder="0" />
      </div>
      <div class="form-group">
        <label>Velocidade</label>
        <input type="number" id="f-velocidade" placeholder="0–100" min="0" max="100" />
      </div>
      <div class="form-group">
        <label>Agilidade</label>
        <input type="number" id="f-agilidade" placeholder="0–100" min="0" max="100" />
      </div>
      <div class="form-group">
        <label>Longevidade (anos)</label>
        <input type="number" id="f-longevidade" placeholder="0" />
      </div>
      <div class="form-group">
        <label>Número Mágico</label>
        <input type="number" id="f-numero_magico" placeholder="0" />
      </div>
      <div class="form-group full">
        <label>URL da Imagem (opcional)</label>
        <input type="text" id="f-imagem" placeholder="https://..." />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitForm()">Salvar</button>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div id="confirm-backdrop">
  <div id="confirm-box">
    <p id="confirm-msg">Tem certeza que deseja deletar este dino?</p>
    <div class="confirm-actions">
      <button class="btn btn-secondary" onclick="closeConfirm(false)">Cancelar</button>
      <button class="btn btn-danger" onclick="closeConfirm(true)">Deletar</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000';
  let editingId = null;
  let confirmResolve = null;

  const dinos_emojis = ['🦕','🦖','🐉','🦴','🌿','🪨','🐾','🔥','💀','🌋'];
  function dinoEmoji(name) {
    const n = (name || '').charCodeAt(0) || 0;
    return dinos_emojis[n % dinos_emojis.length];
  }

  // ── Stat bar max references ──
  const STAT_MAX = { altura: 1500, comprimento: 2000, peso: 80000, velocidade: 100, agilidade: 100, longevidade: 200 };

  function barWidth(key, val) {
    const max = STAT_MAX[key] || 100;
    return Math.min(100, Math.round((parseFloat(val) / max) * 100)) + '%';
  }

  // ── Toast ──
  let toastTimer;
  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3000);
  }

  // ── Confirm ──
  function confirm(msg) {
    return new Promise(res => {
      document.getElementById('confirm-msg').textContent = msg;
      document.getElementById('confirm-backdrop').classList.add('open');
      confirmResolve = res;
    });
  }
  function closeConfirm(val) {
    document.getElementById('confirm-backdrop').classList.remove('open');
    if (confirmResolve) { confirmResolve(val); confirmResolve = null; }
  }

  // ── Load all ──
  async function loadDinos() {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '<div class="state-box"><div class="spinner"></div></div>';
    try {
      const res = await fetch(`${API}/dinos`);
      if (!res.ok) throw new Error(res.statusText);
      const dinos = await res.json();
      renderCards(dinos);
    } catch (e) {
      grid.innerHTML = `<div class="state-box"><span class="icon">⚠️</span>Erro ao conectar com o servidor.<br><small>${e.message}</small></div>`;
    }
  }

  function renderCards(dinos) {
    const grid = document.getElementById('cards-grid');
    if (!dinos.length) {
      grid.innerHTML = '<div class="state-box"><span class="icon">🦴</span>Nenhum dinossauro encontrado.<br>Crie o primeiro!</div>';
      return;
    }
    grid.innerHTML = dinos.map((d, i) => `
      <div class="dino-card" data-id="${d.id_dino}" style="animation-delay:${i * 0.055}s">
        <span class="card-emoji">${dinoEmoji(d.nome)}</span>
        <div class="card-body">
          <div class="card-id">#${String(d.id_dino).padStart(4,'0')}</div>
          <div class="card-name">${escHtml(d.nome)}</div>

          <div class="stats-grid">
            ${statRow('Altura', d.altura, 'cm', 'altura')}
            ${statRow('Comprimento', d.comprimento, 'cm', 'comprimento')}
            ${statRow('Peso', d.peso, 'kg', 'peso')}
            ${statRow('Longevidade', d.longevidade, 'a', 'longevidade')}
            ${statRow('Velocidade', d.velocidade, '', 'velocidade')}
            ${statRow('Agilidade', d.agilidade, '', 'agilidade')}
          </div>

          <div class="magic-label">✦ Número Mágico ✦</div>
          <div class="magic-number">${d.numero_magico ?? '—'}</div>

          <div class="card-actions">
            <button class="btn-edit" onclick="openModal(${JSON.stringify(d).replace(/"/g,'&quot;')})">Editar</button>
            <button class="btn-danger" onclick="deleteDino(${d.id_dino})">Deletar</button>
          </div>
        </div>
      </div>
    `).join('');

    // Animate stat bars after a tick
    requestAnimationFrame(() => {
      document.querySelectorAll('.stat-bar-fill[data-pct]').forEach(el => {
        setTimeout(() => el.style.width = el.dataset.pct, 200);
      });
    });
  }

  function statRow(label, val, unit, key) {
    const display = val != null ? `${val}${unit ? ' '+unit : ''}` : '—';
    const pct = val != null ? barWidth(key, val) : '0%';
    return `
      <div class="stat">
        <span class="stat-label">${label}</span>
        <span class="stat-value">${escHtml(String(display))}</span>
        <div class="stat-bar"><div class="stat-bar-fill" data-pct="${pct}" style="width:0"></div></div>
      </div>`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Modal ──
  function openModal(dino) {
    editingId = dino ? dino.id_dino : null;
    document.getElementById('modal-title').textContent = dino ? 'Editar Dinossauro' : 'Novo Dinossauro';
    const fields = ['nome','altura','comprimento','peso','velocidade','agilidade','longevidade','numero_magico','imagem'];
    fields.forEach(f => {
      document.getElementById('f-' + f).value = dino ? (dino[f] ?? '') : '';
    });
    document.getElementById('modal-backdrop').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    editingId = null;
  }

  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });

  // ── Submit ──
  async function submitForm() {
    const body = {
      nome:          document.getElementById('f-nome').value.trim(),
      altura:        parseFloatOrNull(document.getElementById('f-altura').value),
      comprimento:   parseFloatOrNull(document.getElementById('f-comprimento').value),
      peso:          parseFloatOrNull(document.getElementById('f-peso').value),
      velocidade:    parseFloatOrNull(document.getElementById('f-velocidade').value),
      agilidade:     parseFloatOrNull(document.getElementById('f-agilidade').value),
      longevidade:   parseFloatOrNull(document.getElementById('f-longevidade').value),
      numero_magico: parseFloatOrNull(document.getElementById('f-numero_magico').value),
      imagem:        document.getElementById('f-imagem').value.trim() || null,
    };
    if (!body.nome) { toast('Nome é obrigatório', true); return; }

    try {
      const url = editingId ? `${API}/dinos/${editingId}` : `${API}/dinos`;
      const method = editingId ? 'PUT' : 'POST';
      const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!res.ok) throw new Error((await res.json()).error || res.statusText);
      toast(editingId ? '✓ Dino atualizado!' : '✓ Dino criado!');
      closeModal();
      loadDinos();
    } catch (e) {
      toast('Erro: ' + e.message, true);
    }
  }

  // ── Delete ──
  async function deleteDino(id) {
    const ok = await confirm(`Deletar o dino #${id}? Esta ação não pode ser desfeita.`);
    if (!ok) return;
    try {
      const res = await fetch(`${API}/dinos/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error((await res.json()).error || res.statusText);
      toast('🦴 Dino deletado.');
      loadDinos();
    } catch (e) {
      toast('Erro: ' + e.message, true);
    }
  }

  function parseFloatOrNull(v) {
    const n = parseFloat(v);
    return isNaN(n) ? null : n;
  }

  // ── Boot ──
  loadDinos();
</script>
</body>
</html>
